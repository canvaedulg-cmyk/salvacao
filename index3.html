<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Lendários</title>
    <link rel="stylesheet" href="index3.css">
</head>
<body>

    <h1>⚡ Pokémon Lendários ⚡</h1>

    <table>
        <tr>
            <th>Imagem</th>
            <th>Nome</th>
            <th>Tipo</th>
            <th>Geração</th>
        </tr>
        <tr>
            <td><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/150.png" alt="Mewtwo"></td>
            <td class="pokemon-name">Mewtwo</td>
            <td><span class="type" >Psíquico</span></td>
            <td>1ª</td>
        </tr>
        <tr>
            <td><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/249.png" alt="Lugia"></td>
            <td class="pokemon-name">Lugia</td>
            <td><span class="type" >Voador</span></td>
            <td>2ª</td>
        </tr>
        <tr>
            <td><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/250.png" alt="Ho-Oh"></td>
            <td class="pokemon-name">Ho-Oh</td>
            <td><span class="type" >Fogo</span></td>
            <td>2ª</td>
        </tr>
        <tr>
            <td><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/384.png" alt="Rayquaza"></td>
            <td class="pokemon-name">Rayquaza</td>
            <td><span class="type" >Dragão</span></td>
            <td>3ª</td>
        </tr>
        <tr>
            <td><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/483.png" alt="Dialga"></td>
            <td class="pokemon-name">Dialga</td>
            <td><span class="type">Aço</span></td>
            <td>4ª</td>
        </tr>
    </table>
<button>
        <a href="index2.html">voltar</a>
    </button>

</body>
</html>
